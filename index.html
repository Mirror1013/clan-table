<!--  КЛАНОВАЯ ТАБЛИЦА  -->

<style>
    /* ===== ДОПОЛНИТЕЛЬНЫЕ СТИЛИ ДЛЯ ТАБЛИЦЫ ===== */
    .clan-table-wrap {
        background: #242938;
        border-radius: 12px;
        padding: 20px;
        margin: 20px 0;
        overflow-x: auto;
    }
    
    .clan-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
        min-width: 700px;
    }
    
    .clan-table thead th {
        background: #2f364a;
        padding: 12px 10px;
        text-align: center;
        font-weight: 700;
        color: #b9bfd4;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
        border-bottom: 2px solid #f0b429;
    }
    
    .clan-table thead th:first-child {
        text-align: left;
        padding-left: 20px;
    }
    
    .clan-table thead th:nth-child(2) {
        text-align: left;
    }
    
    .clan-table tbody tr {
        border-bottom: 1px solid #3a4057;
        transition: 0.2s;
    }
    
    .clan-table tbody tr:hover {
        background: #2f364a;
    }
    
    .clan-table tbody td {
        padding: 12px 10px;
        text-align: center;
        vertical-align: middle;
    }
    
    .clan-table tbody td:first-child {
        text-align: left;
        padding-left: 20px;
    }
    
    .clan-table tbody td:nth-child(2) {
        text-align: left;
    }
    
    .clan-pos {
        font-weight: 700;
        font-size: 16px;
        display: inline-block;
        background: #2f364a;
        padding: 2px 10px;
        border-radius: 4px;
    }
    
    .clan-pos-1 {
        color: #ffd700;
        background: #3a2f00;
        border: 1px solid #ffd700;
    }
    
    .clan-pos-2 {
        color: #c0c0c0;
        background: #2f2f2f;
        border: 1px solid #c0c0c0;
    }
    
    .clan-pos-3 {
        color: #cd7f32;
        background: #2f1f0f;
        border: 1px solid #cd7f32;
    }
    
    .clan-pos-other {
        color: #8e95aa;
        background: #1f222f;
    }
    
    .clan-cell {
        display: flex;
        align-items: center;
        gap: 14px;
    }
    
    .clan-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: 700;
        flex-shrink: 0;
        border: 2px solid #3a4057;
        color: #f0b429;
        background: #2f364a;
    }
    
    .clan-info {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }
    
    .clan-name {
        font-weight: 700;
        color: #ffffff;
        font-size: 15px;
    }
    
    .clan-members {
        font-size: 11px;
        color: #5a627a;
        margin-top: 2px;
    }
    
    .clan-points {
        font-weight: 800;
        font-size: 24px;
        color: #f0b429;
    }
    
    .clan-form {
        display: flex;
        gap: 4px;
        justify-content: center;
    }
    
    .clan-form-badge {
        width: 28px;
        height: 28px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: #fff;
    }
    
    .clan-form-win {
        background: #27ae60;
    }
    
    .clan-form-loss {
        background: #e74c3c;
    }
    
    .clan-form-draw {
        background: #f39c12;
    }
    
    .clan-form-empty {
        background: #2f364a;
        color: #4a526b;
    }
    
    .clan-stats {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin: 20px 0;
        justify-content: center;
    }
    
    .clan-stats .stat-item {
        background: #242938;
        padding: 15px 35px;
        border-radius: 10px;
        text-align: center;
        min-width: 130px;
    }
    
    .clan-stats .stat-item .value {
        font-size: 28px;
        font-weight: 700;
        color: #f0b429;
    }
    
    .clan-stats .stat-item .value.green {
        color: #27ae60;
    }
    
    .clan-stats .stat-item .value.red {
        color: #e74c3c;
    }
    
    .clan-stats .stat-item .label {
        color: #8e95aa;
        font-size: 13px;
        margin-top: 4px;
    }
    
    .clan-filters {
        background: #242938;
        padding: 16px 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        border-bottom: 1px solid #3a4057;
        border-radius: 12px 12px 0 0;
    }
    
    .clan-filters input {
        background: #2f364a;
        border: 1px solid #3a4057;
        color: #e0e4f0;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        flex: 1;
        min-width: 200px;
    }
    
    .clan-filters input:focus {
        border-color: #f0b429;
    }
    
    .clan-filters .btn {
        background: #f0b429;
        color: #1a1e2c;
        border: none;
        padding: 8px 24px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
    }
    
    .clan-filters .btn:hover {
        background: #d49c1a;
    }
    
    .clan-filters .btn-reset {
        background: #3a4057;
        color: #e0e4f0;
    }
    
    .clan-filters .btn-reset:hover {
        background: #4a526b;
    }
    
    .clan-filter-count {
        color: #8e95aa;
        font-size: 13px;
        margin-left: auto;
        white-space: nowrap;
    }
    
    @media (max-width: 768px) {
        .clan-table {
            font-size: 12px;
            min-width: 500px;
        }
        .clan-table tbody td,
        .clan-table thead th {
            padding: 8px 6px;
        }
        .clan-icon {
            width: 34px;
            height: 34px;
            font-size: 14px;
        }
        .clan-points {
            font-size: 20px;
        }
        .clan-name {
            font-size: 13px;
        }
        .clan-filters {
            flex-direction: column;
        }
        .clan-filters input,
        .clan-filters .btn {
            width: 100%;
        }
        .clan-filter-count {
            margin-left: 0;
            text-align: center;
            width: 100%;
        }
        .clan-stats .stat-item {
            padding: 12px 18px;
            min-width: 90px;
        }
        .clan-stats .stat-item .value {
            font-size: 20px;
        }
        .clan-form-badge {
            width: 22px;
            height: 22px;
            font-size: 10px;
        }
    }
    
    @media (max-width: 480px) {
        .clan-table tbody td,
        .clan-table thead th {
            padding: 6px 4px;
            font-size: 11px;
        }
        .clan-table thead th {
            font-size: 9px;
        }
        .clan-pos {
            font-size: 12px;
            padding: 1px 6px;
        }
        .clan-cell {
            gap: 8px;
        }
        .clan-icon {
            width: 28px;
            height: 28px;
            font-size: 12px;
        }
        .clan-name {
            font-size: 12px;
        }
        .clan-members {
            font-size: 10px;
        }
        .clan-form-badge {
            width: 20px;
            height: 20px;
            font-size: 9px;
        }
    }
</style>

<!-- ===== ЗАГОЛОВОК ===== -->
<h1 style="color: #f0b429; font-size: 28px; margin: 20px 0 10px 0;">🏆 Рейтинг кланов</h1>
<p style="color: #8e95aa; margin-bottom: 20px;">Турнирная таблица Age of Dino</p>

<!-- ===== ФИЛЬТРЫ ===== -->
<div class="clan-filters">
    <input type="text" id="clanSearch" placeholder="🔍 Поиск клана...">
    <button class="btn" onclick="renderClanTable()">Применить</button>
    <button class="btn btn-reset" onclick="document.getElementById('clanSearch').value='';renderClanTable()">Сбросить</button>
    <span class="clan-filter-count" id="clanCount">Кланов: <b>0</b></span>
</div>

<!-- ===== ТАБЛИЦА ===== -->
<div class="clan-table-wrap">
    <table class="clan-table">
        <thead>
            <tr>
                <th style="text-align:left;padding-left:20px;">#</th>
                <th style="text-align:left;">Клан</th>
                <th>👥</th>
                <th>⚔️</th>
                <th>🏆</th>
                <th>💀</th>
                <th>Очки</th>
                <th>Форма</th>
            </tr>
        </thead>
        <tbody id="clanTableBody"></tbody>
    </table>
</div>

<!-- ===== СТАТИСТИКА ===== -->
<div class="clan-stats">
    <div class="stat-item">
        <div class="value" id="clanStatTotal">0</div>
        <div class="label">🏛️ Всего кланов</div>
    </div>
    <div class="stat-item">
        <div class="value green" id="clanStatWins">0</div>
        <div class="label">🏆 Всего побед</div>
    </div>
    <div class="stat-item">
        <div class="value red" id="clanStatLosses">0</div>
        <div class="label">💀 Всего поражений</div>
    </div>
    <div class="stat-item">
        <div class="value" id="clanStatFights">0</div>
        <div class="label">⚔️ Всего боёв</div>
    </div>
</div>

<script>
    // ================================================================
    //  ДАННЫЕ КЛАНОВ (ИЗ ВАШЕЙ ТАБЛИЦЫ)
    // ================================================================
    var clanData = [
        {id: 1, name: "Invicta", members: 10, fights: 30, wins: 28, losses: 2, form: ["win","win","win","win","win"]},
        {id: 2, name: "GTR", members: 12, fights: 29, wins: 26, losses: 3, form: ["win","win","win","loss","win"]},
        {id: 3, name: "GMT", members: 11, fights: 16, wins: 13, losses: 3, form: ["win","loss","win","win","win"]},
        {id: 4, name: "Teiko", members: 8, fights: 15, wins: 13, losses: 2, form: ["win","win","loss","win","win"]},
        {id: 5, name: "Immortals", members: 15, fights: 13, wins: 11, losses: 2, form: ["win","loss","win","win","win"]},
        {id: 6, name: "DT", members: 14, fights: 12, wins: 10, losses: 2, form: ["loss","win","win","win","loss"]},
        {id: 7, name: "Spirit Bloom", members: 7, fights: 10, wins: 8, losses: 2, form: ["win","loss","win","loss","win"]},
        {id: 8, name: "Aeterna", members: 6, fights: 7, wins: 6, losses: 1, form: ["win","win","win","loss","win"]},
        {id: 9, name: "Galactic Alliance", members: 13, fights: 6, wins: 5, losses: 1, form: ["win","loss","win","win","loss"]},
        {id: 10, name: "Clan Ghost", members: 11, fights: 6, wins: 5, losses: 1, form: ["loss","win","win","loss","win"]},
        {id: 11, name: "Eclipse", members: 10, fights: 6, wins: 5, losses: 1, form: ["win","win","loss","loss","win"]},
        {id: 12, name: "Han", members: 5, fights: 5, wins: 4, losses: 1, form: ["win","win","loss","win","loss"]},
        {id: 13, name: "Hounds", members: 9, fights: 3, wins: 2, losses: 1, form: ["win","loss","win","loss","loss"]},
        {id: 14, name: "Adekvate Team", members: 6, fights: 3, wins: 2, losses: 1, form: ["loss","win","loss","win","loss"]},
        {id: 15, name: "EX.O", members: 5, fights: 2, wins: 2, losses: 0, form: ["win","win","loss","loss","win"]},
        {id: 16, name: "IronLegacy", members: 8, fights: 2, wins: 2, losses: 0, form: ["win","loss","win","loss","win"]},
        {id: 17, name: "NSD", members: 7, fights: 2, wins: 2, losses: 0, form: ["win","loss","win","loss","win"]},
        {id: 18, name: "Void", members: 4, fights: 1, wins: 1, losses: 0, form: ["loss","win","win","loss","draw"]},
        {id: 19, name: "Deviance", members: 3, fights: 0, wins: 0, losses: 0, form: ["loss","loss","loss","loss","loss"]},
        {id: 20, name: "Rising Legends", members: 3, fights: 0, wins: 0, losses: 0, form: ["loss","loss","loss","loss","loss"]},
        {id: 21, name: "Shared Horizon", members: 3, fights: 0, wins: 0, losses: 0, form: ["loss","loss","loss","loss","loss"]},
        {id: 22, name: "High Killers", members: 3, fights: 0, wins: 0, losses: 0, form: ["loss","loss","loss","loss","loss"]},
        {id: 23, name: "Indomitable", members: 3, fights: 0, wins: 0, losses: 0, form: ["loss","loss","loss","loss","loss"]}
    ];

    // ================================================================
    //  ФУНКЦИИ
    // ================================================================

    function getClanPoints(clan) {
        return clan.wins * 3;
    }

    function getClanForm(clan) {
        var f = clan.form || [];
        while (f.length < 5) f.push('');
        return f;
    }

    function renderClanForm(form) {
        var html = '';
        for (var i = 0; i < 5; i++) {
            var r = form[i] || '';
            if (r === 'win') html += '<span class="clan-form-badge clan-form-win">В</span>';
            else if (r === 'loss') html += '<span class="clan-form-badge clan-form-loss">П</span>';
            else if (r === 'draw') html += '<span class="clan-form-badge clan-form-draw">Н</span>';
            else html += '<span class="clan-form-badge clan-form-empty">—</span>';
        }
        return html;
    }

    function renderClanTable() {
        var search = document.getElementById('clanSearch').value.toLowerCase();
        var filtered = [];
        
        for (var i = 0; i < clanData.length; i++) {
            if (clanData[i].name.toLowerCase().indexOf(search) !== -1) {
                filtered.push(clanData[i]);
            }
        }
        
        filtered.sort(function(a, b) {
            var pa = getClanPoints(a);
            var pb = getClanPoints(b);
            if (pa !== pb) return pb - pa;
            return (b.wins - b.losses) - (a.wins - a.losses);
        });
        
        var tbody = document.getElementById('clanTableBody');
        tbody.innerHTML = '';
        
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#8e95aa;">🏛️ Кланов не найдено</td></tr>';
            updateClanStats([]);
            return;
        }
        
        for (var i = 0; i < filtered.length; i++) {
            var c = filtered[i];
            var pos = i + 1;
            var posClass = 'clan-pos-other';
            if (pos === 1) posClass = 'clan-pos-1';
            else if (pos === 2) posClass = 'clan-pos-2';
            else if (pos === 3) posClass = 'clan-pos-3';
            
            var points = getClanPoints(c);
            var form = getClanForm(c);
            var formHtml = renderClanForm(form);
            var firstLetter = c.name.charAt(0).toUpperCase();
            
            var tr = document.createElement('tr');
            tr.innerHTML = 
                '<td><span class="clan-pos ' + posClass + '">' + pos + '</span></td>' +
                '<td><div class="clan-cell"><div class="clan-icon">' + firstLetter + '</div><div class="clan-info"><span class="clan-name">' + c.name + '</span><span class="clan-members">👥 ' + c.members + '</span></div></div></td>' +
                '<td>' + c.members + '</td>' +
                '<td>' + c.fights + '</td>' +
                '<td style="color:#27ae60;font-weight:600;">' + c.wins + '</td>' +
                '<td style="color:#e74c3c;font-weight:600;">' + c.losses + '</td>' +
                '<td class="clan-points">' + points + '</td>' +
                '<td><div class="clan-form">' + formHtml + '</div></td>';
            tbody.appendChild(tr);
        }
        
        updateClanStats(filtered);
    }

    function updateClanStats(data) {
        var total = data.length;
        var wins = 0;
        var losses = 0;
        var fights = 0;
        
        for (var i = 0; i < data.length; i++) {
            wins += data[i].wins;
            losses += data[i].losses;
            fights += data[i].fights;
        }
        
        document.getElementById('clanStatTotal').textContent = total;
        document.getElementById('clanStatWins').textContent = wins;
        document.getElementById('clanStatLosses').textContent = losses;
        document.getElementById('clanStatFights').textContent = fights;
        document.getElementById('clanCount').innerHTML = 'Кланов: <b>' + total + '</b>';
    }

    // ===== ЗАПУСК =====
    renderClanTable();

    // ===== ПОИСК ПО ВВОДУ (с задержкой) =====
    var clanSearchTimeout;
    document.getElementById('clanSearch').addEventListener('input', function() {
        clearTimeout(clanSearchTimeout);
        clanSearchTimeout = setTimeout(renderClanTable, 300);
    });
</script>
